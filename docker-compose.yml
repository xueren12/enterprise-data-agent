services:
  app:
    build: .
    container_name: enterprise-data-agent-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://agent_user:agent_password@postgres:5432/agent_db
      DEFAULT_DATA_SOURCE: postgresql
      SQL_MAX_RETRIES: 2
    ports:
      - "8000:8000"
    volumes:
      - ./charts:/app/charts
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./data/tasks:/app/data/tasks
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: enterprise-data-agent-postgres
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_password
    ports:
      - "15432:5432"
    volumes:
      - agent_postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d agent_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agent_postgres_data:
